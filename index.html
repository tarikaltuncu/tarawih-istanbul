<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hatimle Teravih - Istanbul 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --primary: #1a6b4a;
    --primary-dark: #0d4a30;
    --primary-light: #e8f5ee;
    --gold: #c9a84c;
    --gold-light: #f5ecd4;
    --bg: #fafaf7;
    --text: #1a1a1a;
    --text-light: #555;
    --card-bg: #fff;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: #fff;
    padding: 16px 20px;
    text-align: center;
    position: relative;
    z-index: 1000;
  }

  header h1 {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  header .subtitle {
    font-size: 0.8rem;
    opacity: 0.85;
    margin-top: 2px;
  }

  .ramadan-info {
    background: var(--gold);
    color: var(--primary-dark);
    padding: 8px 16px;
    text-align: center;
    font-weight: 600;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .ramadan-info .day-badge {
    background: var(--primary-dark);
    color: #fff;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.8rem;
  }

  #map {
    flex: 1;
    min-height: 400px;
    z-index: 1;
  }

  .controls {
    position: absolute;
    top: 110px;
    right: 12px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ctrl-btn {
    background: var(--card-bg);
    border: none;
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--primary-dark);
    cursor: pointer;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .ctrl-btn:hover { background: var(--primary-light); }
  .ctrl-btn:active { transform: scale(0.97); }

  .ctrl-btn.primary-btn {
    background: var(--primary);
    color: #fff;
  }
  .ctrl-btn.primary-btn:hover { background: var(--primary-dark); }

  .bottom-panel {
    background: var(--card-bg);
    border-top: 1px solid #e8e8e5;
    padding: 0;
    position: relative;
    z-index: 1000;
  }

  .panel-tabs {
    display: flex;
    border-bottom: 1px solid #e8e8e5;
  }

  .panel-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-light);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .panel-tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }

  .panel-content {
    display: none;
    padding: 16px;
  }

  .panel-content.active { display: block; }

  .juz-section h3 {
    font-size: 1rem;
    margin-bottom: 8px;
    color: var(--primary-dark);
  }

  .juz-section p {
    font-size: 0.85rem;
    color: var(--text-light);
    margin-bottom: 12px;
  }

  .video-container {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    border-radius: var(--radius);
    overflow: hidden;
    background: #000;
  }

  .video-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .nearest-section {
    text-align: center;
  }

  .nearest-card {
    background: var(--primary-light);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  .nearest-card .mosque-name {
    font-weight: 700;
    font-size: 1rem;
    color: var(--primary-dark);
  }

  .nearest-card .mosque-district {
    font-size: 0.85rem;
    color: var(--text-light);
    margin-top: 2px;
  }

  .nearest-card .mosque-distance {
    font-size: 0.9rem;
    color: var(--primary);
    font-weight: 600;
    margin-top: 6px;
  }

  .navigate-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 12px 24px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }

  .navigate-btn:hover { background: var(--primary-dark); }

  .location-prompt {
    color: var(--text-light);
    font-size: 0.85rem;
  }

  .search-box {
    position: absolute;
    top: 110px;
    left: 12px;
    z-index: 1000;
  }

  .search-box input {
    width: 200px;
    padding: 10px 14px;
    border: none;
    border-radius: var(--radius);
    font-size: 0.85rem;
    box-shadow: var(--shadow);
    outline: none;
    background: var(--card-bg);
  }

  .search-box input:focus {
    box-shadow: 0 0 0 2px var(--primary), var(--shadow);
  }

  .district-filter {
    position: absolute;
    top: 155px;
    left: 12px;
    z-index: 1000;
  }

  .district-filter select {
    padding: 8px 12px;
    border: none;
    border-radius: var(--radius);
    font-size: 0.8rem;
    box-shadow: var(--shadow);
    outline: none;
    background: var(--card-bg);
    cursor: pointer;
    max-width: 200px;
  }

  .mosque-list-panel {
    max-height: 250px;
    overflow-y: auto;
  }

  .mosque-list-item {
    padding: 10px 12px;
    border-bottom: 1px solid #f0f0ed;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .mosque-list-item:hover { background: var(--primary-light); }

  .mosque-list-item .name {
    font-weight: 600;
    font-size: 0.85rem;
  }

  .mosque-list-item .district {
    font-size: 0.75rem;
    color: var(--text-light);
  }

  .mosque-list-item .dist {
    font-size: 0.75rem;
    color: var(--primary);
    font-weight: 600;
    white-space: nowrap;
  }

  .leaflet-popup-content-wrapper {
    border-radius: var(--radius) !important;
    box-shadow: var(--shadow) !important;
  }

  .popup-content {
    text-align: center;
    padding: 4px 0;
  }

  .popup-content .name {
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--primary-dark);
    margin-bottom: 2px;
  }

  .popup-content .district {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-bottom: 8px;
  }

  .popup-content .nav-link {
    display: inline-block;
    background: var(--primary);
    color: #fff;
    padding: 6px 14px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 600;
  }

  .no-ramadan {
    text-align: center;
    padding: 30px 20px;
    color: var(--text-light);
  }

  .no-ramadan h3 {
    color: var(--primary-dark);
    margin-bottom: 8px;
  }

  .juz-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .juz-nav button {
    background: var(--primary-light);
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    font-size: 1rem;
    cursor: pointer;
    color: var(--primary-dark);
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .juz-nav button:hover { background: var(--primary); color: #fff; }
  .juz-nav button:disabled { opacity: 0.3; cursor: default; }
  .juz-nav button:disabled:hover { background: var(--primary-light); color: var(--primary-dark); }

  .juz-nav .juz-label {
    font-weight: 700;
    font-size: 1rem;
    color: var(--primary-dark);
    min-width: 80px;
    text-align: center;
  }

  @media (max-width: 480px) {
    header h1 { font-size: 1.1rem; }
    .search-box input { width: 160px; }
    .controls { right: 8px; }
    .search-box { left: 8px; }
    .district-filter { left: 8px; }
  }
</style>
</head>
<body>

<header>
  <h1>Hatimle Teravih Namazı</h1>
  <div class="subtitle">Istanbul 2026 / Ramazan 1447</div>
</header>

<div class="ramadan-info" id="ramadanInfo">
  <span id="ramadanDay">Ramazan</span>
  <span class="day-badge" id="juzBadge">Cuz</span>
</div>

<div style="position:relative; flex:1; display:flex; flex-direction:column;">
  <div id="map"></div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Cami ara...">
  </div>

  <div class="district-filter">
    <select id="districtFilter">
      <option value="">Tum ilceler</option>
    </select>
  </div>

  <div class="controls">
    <button class="ctrl-btn primary-btn" id="locateBtn" onclick="locateUser()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>
      Konumum
    </button>
    <button class="ctrl-btn" id="nearestBtn" onclick="showNearestTab()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
      En Yakın
    </button>
  </div>
</div>

<div class="bottom-panel">
  <div class="panel-tabs">
    <button class="panel-tab active" data-tab="juz" onclick="switchTab('juz')">Gunun Cuzu</button>
    <button class="panel-tab" data-tab="nearest" onclick="switchTab('nearest')">En Yakın Cami</button>
    <button class="panel-tab" data-tab="list" onclick="switchTab('list')">Cami Listesi</button>
  </div>

  <div class="panel-content active" id="tab-juz">
    <div class="juz-section" id="juzContent"></div>
  </div>

  <div class="panel-content" id="tab-nearest">
    <div class="nearest-section" id="nearestContent">
      <p class="location-prompt">Konumunuzu paylasarak en yakin camiyi bulun</p>
      <button class="navigate-btn" onclick="locateUser()" style="margin-top:12px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>
        Konum Paylas
      </button>
    </div>
  </div>

  <div class="panel-content" id="tab-list">
    <div class="mosque-list-panel" id="mosqueList"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// Ramadan 2026: first day of fasting = Feb 19, first Tarawih evening = Feb 18
const RAMADAN_FIRST_TARAWIH = new Date(2026, 1, 18); // Feb 18, 2026
const RAMADAN_LAST_DAY = new Date(2026, 2, 19); // ~March 19, 2026

// Title case helper
function titleCase(str) {
  return str.toLowerCase().split(' ').map(w => {
    if (w.length <= 2) return w.toUpperCase();
    return w.charAt(0).toUpperCase() + w.slice(1);
  }).join(' ');
}

// Calculate Ramadan day
function getRamadanDay() {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff = Math.floor((today - RAMADAN_FIRST_TARAWIH) / (1000 * 60 * 60 * 24));
  if (diff < 0 || diff >= 30) return null;
  return diff + 1; // 1-indexed
}

// Distance calculation (Haversine)
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDistance(km) {
  if (km < 1) return Math.round(km * 1000) + ' m';
  return km.toFixed(1) + ' km';
}

// Initialize map
function initMap() {
  map = L.map('map').setView([41.015, 28.98], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  const mosqueIcon = L.divIcon({
    html: '<div style="background:#1a6b4a;color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);">&#9765;</div>',
    className: '',
    iconSize: [28, 28],
    iconAnchor: [14, 14]
  });

  MOSQUES.forEach(m => {
    if (!m.lat || !m.lon) return;
    const marker = L.marker([m.lat, m.lon], { icon: mosqueIcon });
    const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${m.lat},${m.lon}&travelmode=walking`;
    marker.bindPopup(`
      <div class="popup-content">
        <div class="name">${titleCase(m.mosque)}</div>
        <div class="district">${titleCase(m.district)}</div>
        <a href="${navUrl}" target="_blank" class="nav-link">Yol Tarifi</a>
      </div>
    `);
    marker.mosqueData = m;
    marker.addTo(map);
    markers.push(marker);
  });

  visibleMarkers = [...markers];
}

// Populate district filter
function initDistrictFilter() {
  const districts = [...new Set(MOSQUES.map(m => m.district))].sort();
  const select = document.getElementById('districtFilter');
  districts.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = titleCase(d);
    select.appendChild(opt);
  });

  select.addEventListener('change', filterMosques);
}

// Search + filter
function filterMosques() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const district = document.getElementById('districtFilter').value;

  markers.forEach(marker => {
    const m = marker.mosqueData;
    const matchSearch = !search ||
      m.mosque.toLowerCase().includes(search) ||
      m.district.toLowerCase().includes(search);
    const matchDistrict = !district || m.district === district;

    if (matchSearch && matchDistrict) {
      if (!map.hasLayer(marker)) marker.addTo(map);
    } else {
      if (map.hasLayer(marker)) map.removeLayer(marker);
    }
  });

  updateMosqueList();
}

// Locate user
function locateUser() {
  if (!navigator.geolocation) {
    alert('Tarayiciniz konum desteklemiyor.');
    return;
  }

  const btn = document.getElementById('locateBtn');
  btn.textContent = 'Aranıyor...';

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;

      if (userMarker) map.removeLayer(userMarker);

      const userIcon = L.divIcon({
        html: '<div style="background:#3b82f6;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px #3b82f6,0 2px 6px rgba(0,0,0,0.3);"></div>',
        className: '',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      });

      userMarker = L.marker([userLat, userLon], { icon: userIcon }).addTo(map);
      userMarker.bindPopup('<b>Konumunuz</b>').openPopup();
      map.setView([userLat, userLon], 13);

      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg> Konumum';

      updateNearestSection();
      updateMosqueList();
      switchTab('nearest');
    },
    (err) => {
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg> Konumum';
      alert('Konum alinamadi. Lutfen konum izni verin.');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// Update nearest section
function updateNearestSection() {
  if (!userLat || !userLon) return;

  const sorted = MOSQUES
    .filter(m => m.lat && m.lon)
    .map(m => ({
      ...m,
      distance: getDistance(userLat, userLon, m.lat, m.lon)
    }))
    .sort((a, b) => a.distance - b.distance);

  const top3 = sorted.slice(0, 3);
  const container = document.getElementById('nearestContent');

  container.innerHTML = top3.map((m, i) => {
    const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${m.lat},${m.lon}&travelmode=walking`;
    return `
      <div class="nearest-card" onclick="map.setView([${m.lat},${m.lon}],16)" style="cursor:pointer">
        <div class="mosque-name">${i === 0 ? '&#11088; ' : ''}${titleCase(m.mosque)}</div>
        <div class="mosque-district">${titleCase(m.district)}</div>
        <div class="mosque-distance">${formatDistance(m.distance)}</div>
      </div>
      ${i === 0 ? `<a href="${navUrl}" target="_blank" class="navigate-btn" style="margin-bottom:16px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
        Google Maps ile Yol Tarifi
      </a>` : ''}
    `;
  }).join('');
}

// Update mosque list
function updateMosqueList() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const district = document.getElementById('districtFilter').value;

  let filtered = MOSQUES.filter(m => {
    const matchSearch = !search ||
      m.mosque.toLowerCase().includes(search) ||
      m.district.toLowerCase().includes(search);
    const matchDistrict = !district || m.district === district;
    return matchSearch && matchDistrict && m.lat && m.lon;
  });

  if (userLat && userLon) {
    filtered = filtered.map(m => ({
      ...m,
      distance: getDistance(userLat, userLon, m.lat, m.lon)
    })).sort((a, b) => a.distance - b.distance);
  } else {
    filtered.sort((a, b) => a.district.localeCompare(b.district) || a.mosque.localeCompare(b.mosque));
  }

  const container = document.getElementById('mosqueList');
  container.innerHTML = filtered.map(m => `
    <div class="mosque-list-item" onclick="map.setView([${m.lat},${m.lon}],16);markers.find(mk=>mk.mosqueData.no===${m.no})?.openPopup()">
      <div>
        <div class="name">${titleCase(m.mosque)}</div>
        <div class="district">${titleCase(m.district)}</div>
      </div>
      ${m.distance !== undefined ? `<div class="dist">${formatDistance(m.distance)}</div>` : ''}
    </div>
  `).join('');
}

// Initialize Juz section
function initJuzSection() {
  const day = getRamadanDay();
  currentJuz = day || 1;
  renderJuz(currentJuz);
  updateRamadanInfo(day);
}

function updateRamadanInfo(day) {
  const infoEl = document.getElementById('ramadanInfo');
  const dayEl = document.getElementById('ramadanDay');
  const badgeEl = document.getElementById('juzBadge');

  if (day) {
    dayEl.textContent = `Ramazan ${day}. Gece`;
    badgeEl.textContent = `${day}. Cuz`;
  } else {
    const now = new Date();
    if (now < RAMADAN_FIRST_TARAWIH) {
      dayEl.textContent = 'Ramazan yaklasıyor';
      badgeEl.textContent = 'Beklemede';
    } else {
      dayEl.textContent = 'Ramazan 2026';
      badgeEl.textContent = '144 Cami';
    }
  }
}

function renderJuz(juz) {
  currentJuz = juz;
  const container = document.getElementById('juzContent');
  const day = getRamadanDay();
  const isToday = day === juz;

  container.innerHTML = `
    <div class="juz-nav">
      <button onclick="renderJuz(${juz - 1})" ${juz <= 1 ? 'disabled' : ''}>&larr;</button>
      <div class="juz-label">${juz}. Cuz${isToday ? ' (Bugun)' : ''}</div>
      <button onclick="renderJuz(${juz + 1})" ${juz >= 30 ? 'disabled' : ''}>&rarr;</button>
    </div>
    <p>${isToday ? 'Bu gece teravihte okunacak cuzun meali:' : `${juz}. cuzun Turkce meali:`}</p>
    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/${JUZ_VIDEOS[juz - 1]}"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen loading="lazy"></iframe>
    </div>
  `;
}

// Tab switching
function switchTab(tabName) {
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
  document.getElementById(`tab-${tabName}`).classList.add('active');

  if (tabName === 'list') updateMosqueList();
}

function showNearestTab() {
  if (!userLat || !userLon) {
    locateUser();
  } else {
    switchTab('nearest');
  }
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  initDistrictFilter();
  initJuzSection();
  updateMosqueList();

  document.getElementById('searchInput').addEventListener('input', filterMosques);
});
</script>
