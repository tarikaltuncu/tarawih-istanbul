<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hatimle Teravih - Istanbul 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --primary: #1a6b4a;
    --primary-dark: #0d4a30;
    --primary-light: #e8f5ee;
    --gold: #c9a84c;
    --gold-light: #f5ecd4;
    --bg: #fafaf7;
    --text: #1a1a1a;
    --text-light: #555;
    --card-bg: #fff;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }
  header { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: #fff; padding: 16px 20px; text-align: center; position: relative; z-index: 1000; }
  header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.02em; }
  header .subtitle { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }
  .ramadan-info { background: var(--gold); color: var(--primary-dark); padding: 8px 16px; text-align: center; font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .ramadan-info .day-badge { background: var(--primary-dark); color: #fff; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; }
  #map { flex: 1; min-height: 400px; z-index: 1; }
  .controls { position: absolute; top: 110px; right: 12px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
  .ctrl-btn { background: var(--card-bg); border: none; border-radius: var(--radius); padding: 10px 14px; font-size: 0.8rem; font-weight: 600; color: var(--primary-dark); cursor: pointer; box-shadow: var(--shadow); display: flex; align-items: center; gap: 6px; white-space: nowrap; transition: all 0.2s; }
  .ctrl-btn:hover { background: var(--primary-light); }
  .ctrl-btn:active { transform: scale(0.97); }
  .ctrl-btn.primary-btn { background: var(--primary); color: #fff; }
  .ctrl-btn.primary-btn:hover { background: var(--primary-dark); }
  .bottom-panel { background: var(--card-bg); border-top: 1px solid #e8e8e5; padding: 0; position: relative; z-index: 1000; }
  .panel-tabs { display: flex; border-bottom: 1px solid #e8e8e5; }
  .panel-tab { flex: 1; padding: 10px; text-align: center; font-size: 0.8rem; font-weight: 600; cursor: pointer; color: var(--text-light); background: none; border: none; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .panel-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .panel-content { display: none; padding: 16px; }
  .panel-content.active { display: block; }
  .juz-section p { font-size: 0.85rem; color: var(--text-light); margin-bottom: 12px; }
  .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: var(--radius); overflow: hidden; background: #000; }
  .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  .juz-links { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .juz-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; text-decoration: none; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
  .juz-link.emushaf { background: var(--gold-light); color: var(--primary-dark); border: 1px solid var(--gold); }
  .juz-link.emushaf:hover { background: var(--gold); }
  .nearest-section { text-align: center; }
  .nearest-card { background: var(--primary-light); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .nearest-card .mosque-name { font-weight: 700; font-size: 1rem; color: var(--primary-dark); }
  .nearest-card .mosque-district { font-size: 0.85rem; color: var(--text-light); margin-top: 2px; }
  .nearest-card .mosque-distance { font-size: 0.9rem; color: var(--primary); font-weight: 600; margin-top: 6px; }
  .navigate-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); padding: 12px 24px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; }
  .navigate-btn:hover { background: var(--primary-dark); }
  .location-prompt { color: var(--text-light); font-size: 0.85rem; }
  .search-box { position: absolute; top: 110px; left: 12px; z-index: 1000; }
  .search-box input { width: 200px; padding: 10px 14px; border: none; border-radius: var(--radius); font-size: 0.85rem; box-shadow: var(--shadow); outline: none; background: var(--card-bg); }
  .search-box input:focus { box-shadow: 0 0 0 2px var(--primary), var(--shadow); }
  .district-filter { position: absolute; top: 155px; left: 12px; z-index: 1000; }
  .district-filter select { padding: 8px 12px; border: none; border-radius: var(--radius); font-size: 0.8rem; box-shadow: var(--shadow); outline: none; background: var(--card-bg); cursor: pointer; max-width: 200px; }
  .mosque-list-panel { max-height: 250px; overflow-y: auto; }
  .mosque-list-item { padding: 10px 12px; border-bottom: 1px solid #f0f0ed; cursor: pointer; transition: background 0.15s; display: flex; justify-content: space-between; align-items: center; }
  .mosque-list-item:hover { background: var(--primary-light); }
  .mosque-list-item .name { font-weight: 600; font-size: 0.85rem; }
  .mosque-list-item .district { font-size: 0.75rem; color: var(--text-light); }
  .mosque-list-item .dist { font-size: 0.75rem; color: var(--primary); font-weight: 600; white-space: nowrap; }
  .leaflet-popup-content-wrapper { border-radius: var(--radius) !important; box-shadow: var(--shadow) !important; }
  .popup-content { text-align: center; padding: 4px 0; }
  .popup-content .name { font-weight: 700; font-size: 0.9rem; color: var(--primary-dark); margin-bottom: 2px; }
  .popup-content .district { font-size: 0.8rem; color: var(--text-light); margin-bottom: 8px; }
  .popup-content .score { font-size: 0.75rem; color: var(--gold); margin-bottom: 6px; }
  .popup-content .nav-link { display: inline-block; background: var(--primary); color: #fff; padding: 6px 14px; border-radius: 8px; text-decoration: none; font-size: 0.8rem; font-weight: 600; }
  .juz-nav { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; }
  .juz-nav button { background: var(--primary-light); border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; color: var(--primary-dark); font-weight: 700; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .juz-nav button:hover { background: var(--primary); color: #fff; }
  .juz-nav button:disabled { opacity: 0.3; cursor: default; }
  .juz-nav button:disabled:hover { background: var(--primary-light); color: var(--primary-dark); }
  .juz-nav .juz-label { font-weight: 700; font-size: 1rem; color: var(--primary-dark); min-width: 80px; text-align: center; }
  @media (max-width: 480px) { header h1 { font-size: 1.1rem; } .search-box input { width: 160px; } .controls { right: 8px; } .search-box { left: 8px; } .district-filter { left: 8px; } }
</style>
</head>
<body>
<header>
  <h1>Hatimle Teravih Namazi</h1>
  <div class="subtitle">Istanbul 2026 / Ramazan 1447</div>
</header>
<div class="ramadan-info" id="ramadanInfo">
  <span id="ramadanDay">Ramazan</span>
  <span class="day-badge" id="juzBadge">Cuz</span>
</div>
<div style="position:relative; flex:1; display:flex; flex-direction:column;">
  <div id="map"></div>
  <div class="search-box"><input type="text" id="searchInput" placeholder="Cami ara..."></div>
  <div class="district-filter"><select id="districtFilter"><option value="">Tum ilceler</option></select></div>
  <div class="controls">
    <button class="ctrl-btn primary-btn" id="locateBtn" onclick="locateUser()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>
      Konumum
    </button>
    <button class="ctrl-btn" id="nearestBtn" onclick="showNearestTab()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
      En Yakin
    </button>
  </div>
</div>
<div class="bottom-panel">
  <div class="panel-tabs">
    <button class="panel-tab active" data-tab="juz" onclick="switchTab('juz')">Gunun Cuzu</button>
    <button class="panel-tab" data-tab="nearest" onclick="switchTab('nearest')">En Yakin Cami</button>
    <button class="panel-tab" data-tab="list" onclick="switchTab('list')">Cami Listesi</button>
  </div>
  <div class="panel-content active" id="tab-juz"><div class="juz-section" id="juzContent"></div></div>
  <div class="panel-content" id="tab-nearest">
    <div class="nearest-section" id="nearestContent">
      <p class="location-prompt">Konumunuzu paylasarak en yakin camiyi bulun</p>
      <button class="navigate-btn" onclick="locateUser()" style="margin-top:12px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>
        Konum Paylas
      </button>
    </div>
  </div>
  <div class="panel-content" id="tab-list"><div class="mosque-list-panel" id="mosqueList"></div></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const CRESCENT_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30"><circle cx="15" cy="15" r="14" fill="#0d4a30" stroke="#fff" stroke-width="2"/><g transform="translate(15,15) scale(0.55)"><path d="M3,-12 A10,10 0 1,0 3,12 A7.5,7.5 0 1,1 3,-12Z" fill="#c9a84c"/><polygon points="10,-2 11.2,1.5 15,1.8 12,4.2 13,8 10,5.8 7,8 8,4.2 5,1.8 8.8,1.5" fill="#c9a84c"/></g></svg>`;
const CRESCENT_ICON_URL = 'data:image/svg+xml;base64,' + btoa(CRESCENT_SVG);
const JUZ_VIDEOS = ["wj1cpyRWZYM","5jrIvaMABlI","fxKYtfnHFwE","3FD_Zqhcg9w","T2Vle2xDNks","yc1jFX6ctEc","ZXXUySC37RI","aW6cWVRALm0","HJx60zJ48qQ","DO-w82MdFfw","vUM51_vClkU","hPygHDDVY1o","LivHKFq4RdU","xYB-zLs7EgA","OLQbT8wz4jc","vwQqf2kmDj8","NHsF-TuGI68","9DN1jLjRA3M","bOU6Z9gARI8","aaLXt0d6hpo","-IysTQpiPng","_Y9vF6oVdQA","cjipU7EceTw","w0TyNLBLLHw","x4LnkiyG6bA","A5ZeJ6rBYCw","7dz_1fWALyQ","ZC_eZLmMe48","FeduQaXDfkg","ana4Xslgs6o"];
const RAMADAN_FIRST_TARAWIH = new Date(2026, 1, 18);
let MOSQUES = [], map, markers = [], userMarker, userLat, userLon, currentJuz = null;

function titleCase(s){return s.toLowerCase().split(' ').map(w=>w.length<=2?w.toUpperCase():w[0].toUpperCase()+w.slice(1)).join(' ');}
function getRamadanDay(){const d=Math.floor((new Date(new Date().getFullYear(),new Date().getMonth(),new Date().getDate())-RAMADAN_FIRST_TARAWIH)/864e5);return d<0||d>=30?null:d+1;}
function getDistance(a,b,c,d){const R=6371,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function formatDistance(k){return k<1?Math.round(k*1000)+' m':k.toFixed(1)+' km';}

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines[0].charCodeAt(0)===0xFEFF)lines[0]=lines[0].slice(1);
  const headers=lines[0].split(',');
  const data=[];
  for(let i=1;i<lines.length;i++){
    const vals=[];let cur='',inQ=false;
    for(const c of lines[i]){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=c;}
    vals.push(cur.trim());
    if(vals.length>=headers.length){const o={};headers.forEach((h,j)=>o[h.trim()]=vals[j]||'');data.push(o);}
  }
  return data;
}

async function loadMosques(){
  const resp=await fetch('mosques.csv');
  const text=await resp.text();
  const rows=parseCSV(text);
  MOSQUES=rows.filter(r=>r.latitude&&r.longitude).map(r=>({
    no:parseInt(r.index),mosque:r.mosque_name,district:r.district,
    lat:parseFloat(r.latitude),lon:parseFloat(r.longitude),
    score:r.google_maps_score||null,gmapsUrl:r.google_maps_url||null
  }));
}

function initMap(){
  map=L.map('map').setView([41.015,28.98],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19}).addTo(map);
  const icon=L.icon({iconUrl:CRESCENT_ICON_URL,iconSize:[30,30],iconAnchor:[15,15],popupAnchor:[0,-16]});
  MOSQUES.forEach(m=>{
    if(!m.lat||!m.lon)return;
    const mk=L.marker([m.lat,m.lon],{icon});
    const nav=`https://www.google.com/maps/dir/?api=1&destination=${m.lat},${m.lon}&travelmode=walking`;
    const sc=m.score?`<div class="score">${'★'.repeat(Math.round(parseFloat(m.score)))} ${m.score}</div>`:'';
    mk.bindPopup(`<div class="popup-content"><div class="name">${titleCase(m.mosque)}</div><div class="district">${titleCase(m.district)}</div>${sc}<a href="${nav}" target="_blank" class="nav-link">Yol Tarifi</a></div>`);
    mk.mosqueData=m;mk.addTo(map);markers.push(mk);
  });
}

function initDistrictFilter(){
  const ds=[...new Set(MOSQUES.map(m=>m.district))].sort();
  const sel=document.getElementById('districtFilter');
  ds.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=titleCase(d);sel.appendChild(o);});
  sel.addEventListener('change',filterMosques);
}

function filterMosques(){
  const s=document.getElementById('searchInput').value.toLowerCase(),d=document.getElementById('districtFilter').value;
  markers.forEach(mk=>{const m=mk.mosqueData;const ok=(!s||m.mosque.toLowerCase().includes(s)||m.district.toLowerCase().includes(s))&&(!d||m.district===d);if(ok){if(!map.hasLayer(mk))mk.addTo(map);}else{if(map.hasLayer(mk))map.removeLayer(mk);}});
  updateMosqueList();
}

function locateUser(){
  if(!navigator.geolocation){alert('Konum desteklenmiyor.');return;}
  const btn=document.getElementById('locateBtn');btn.textContent='Araniyor...';
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;userLon=pos.coords.longitude;
    if(userMarker)map.removeLayer(userMarker);
    const ui=L.divIcon({html:'<div style="background:#3b82f6;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px #3b82f6,0 2px 6px rgba(0,0,0,0.3);"></div>',className:'',iconSize:[16,16],iconAnchor:[8,8]});
    userMarker=L.marker([userLat,userLon],{icon:ui}).addTo(map);userMarker.bindPopup('<b>Konumunuz</b>').openPopup();
    map.setView([userLat,userLon],13);
    btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg> Konumum';
    updateNearestSection();updateMosqueList();switchTab('nearest');
  },()=>{btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg> Konumum';alert('Konum alinamadi.');},{enableHighAccuracy:true,timeout:10000});
}

function updateNearestSection(){
  if(!userLat||!userLon)return;
  const sorted=MOSQUES.filter(m=>m.lat&&m.lon).map(m=>({...m,distance:getDistance(userLat,userLon,m.lat,m.lon)})).sort((a,b)=>a.distance-b.distance);
  const top3=sorted.slice(0,3),el=document.getElementById('nearestContent');
  el.innerHTML=top3.map((m,i)=>{
    const nav=`https://www.google.com/maps/dir/?api=1&destination=${m.lat},${m.lon}&travelmode=walking`;
    return `<div class="nearest-card" onclick="map.setView([${m.lat},${m.lon}],16)" style="cursor:pointer"><div class="mosque-name">${i===0?'&#11088; ':''}${titleCase(m.mosque)}</div><div class="mosque-district">${titleCase(m.district)}</div><div class="mosque-distance">${formatDistance(m.distance)}</div></div>${i===0?`<a href="${nav}" target="_blank" class="navigate-btn" style="margin-bottom:16px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>Google Maps ile Yol Tarifi</a>`:''}`;
  }).join('');
}

function updateMosqueList(){
  const s=document.getElementById('searchInput').value.toLowerCase(),d=document.getElementById('districtFilter').value;
  let f=MOSQUES.filter(m=>(!s||m.mosque.toLowerCase().includes(s)||m.district.toLowerCase().includes(s))&&(!d||m.district===d)&&m.lat&&m.lon);
  if(userLat&&userLon)f=f.map(m=>({...m,distance:getDistance(userLat,userLon,m.lat,m.lon)})).sort((a,b)=>a.distance-b.distance);
  else f.sort((a,b)=>a.district.localeCompare(b.district)||a.mosque.localeCompare(b.mosque));
  document.getElementById('mosqueList').innerHTML=f.map(m=>`<div class="mosque-list-item" onclick="map.setView([${m.lat},${m.lon}],16);markers.find(mk=>mk.mosqueData.no===${m.no})?.openPopup()"><div><div class="name">${titleCase(m.mosque)}</div><div class="district">${titleCase(m.district)}</div></div>${m.distance!==undefined?`<div class="dist">${formatDistance(m.distance)}</div>`:''}</div>`).join('');
}

function initJuzSection(){const d=getRamadanDay();currentJuz=d||1;renderJuz(currentJuz);updateRamadanInfo(d);}

function updateRamadanInfo(day){
  const dEl=document.getElementById('ramadanDay'),bEl=document.getElementById('juzBadge');
  if(day){dEl.textContent=`Ramazan ${day}. Gece`;bEl.textContent=`${day}. Cuz`;}
  else if(new Date()<RAMADAN_FIRST_TARAWIH){dEl.textContent='Ramazan yaklasıyor';bEl.textContent='Beklemede';}
  else{dEl.textContent='Ramazan 2026';bEl.textContent='144 Cami';}
}

function renderJuz(juz){
  currentJuz=juz;const el=document.getElementById('juzContent'),day=getRamadanDay(),today=day===juz;
  el.innerHTML=`
    <div class="juz-nav"><button onclick="renderJuz(${juz-1})" ${juz<=1?'disabled':''}>&larr;</button><div class="juz-label">${juz}. Cuz${today?' (Bugun)':''}</div><button onclick="renderJuz(${juz+1})" ${juz>=30?'disabled':''}>&rarr;</button></div>
    <p>${today?'Bu gece teravihte okunacak cuzun meali:':`${juz}. cuzun Turkce meali:`}</p>
    <div class="video-container"><iframe src="https://www.youtube.com/embed/${JUZ_VIDEOS[juz-1]}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>
    <div class="juz-links"><a href="https://emushaf.net/cuz/${juz}/" target="_blank" class="juz-link emushaf"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>${juz}. Cuz Arapca Metin (e-Mushaf)</a></div>`;
}

function switchTab(t){document.querySelectorAll('.panel-tab').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.panel-content').forEach(e=>e.classList.remove('active'));document.querySelector(`[data-tab="${t}"]`).classList.add('active');document.getElementById(`tab-${t}`).classList.add('active');if(t==='list')updateMosqueList();}
function showNearestTab(){if(!userLat||!userLon)locateUser();else switchTab('nearest');}

document.addEventListener('DOMContentLoaded',async()=>{
  await loadMosques();initMap();initDistrictFilter();initJuzSection();updateMosqueList();
  document.getElementById('searchInput').addEventListener('input',filterMosques);
});
</script>
</body>
</html>
